name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Release Keystore
        run: |
          cd android-app
          # Generate the keystore only if it doesn't exist.
          # We use the same passwords and alias configured in app/build.gradle
          if [ ! -f withpro-release-key.jks ]; then
            echo "Generating new release keystore..."
            keytool -genkey -v -keystore withpro-release-key.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias withpro-key \
              -storepass withpro123 \
              -keypass withpro123 \
              -dname "CN=WithPro, O=WithPro, C=KR"
          else
            echo "Keystore already exists."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Initialize Gradle Wrapper and Build Release Bundle (AAB)
        run: |
          cd android-app
          # Generate wrapper dynamically so we don't have to check it into Git
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload Signed AAB (Android App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: withpro-release-aab
          path: android-app/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Release Keystore (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: withpro-release-keystore
          path: android-app/withpro-release-key.jks
