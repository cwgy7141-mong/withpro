name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Release Keystore
        run: |
          cd android-app
          if [ ! -f withpro-release-key.jks ]; then
            echo "Generating new release keystore..."
            keytool -genkey -v -keystore withpro-release-key.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias withpro-key \
              -storepass withpro123 \
              -keypass withpro123 \
              -dname "CN=WithPro, O=WithPro, C=KR"
          else
            echo "Keystore already exists."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Initialize Gradle Wrapper and Build Release Bundle (AAB)
        run: |
          cd android-app
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload Signed AAB (Android App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: withpro-release-aab
          path: android-app/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Release Keystore (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: withpro-release-keystore
          path: android-app/withpro-release-key.jks

      - name: Push Build Artifacts to Builds Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          mkdir dist
          cp android-app/app/build/outputs/bundle/release/app-release.aab dist/
          cp android-app/withpro-release-key.jks dist/
          
          cd dist
          git init
          git checkout -b builds
          git add .
          git commit -m "Build artifacts for commit ${{ github.sha }}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin builds
